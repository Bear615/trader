<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trader Mobile Redesign Contact Sheet</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px;
      background: #f0f2ef;
      color: #111716;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 24px;
      color: #56605c;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 22px;
      align-items: start;
    }
    .card {
      padding: 12px;
      border: 1px solid #d1d8d4;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(17, 23, 22, 0.12);
    }
    .frame {
      width: 195px;
      height: 422px;
      overflow: hidden;
      border-radius: 8px;
      background: #090b0c;
    }
    iframe {
      width: 390px;
      height: 844px;
      border: 0;
      transform: scale(0.5);
      transform-origin: 0 0;
      pointer-events: none;
    }
    .caption {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 800;
      color: #111716;
    }
  </style>
</head>
<body>
  <h1>Trader Mobile Redesign</h1>
  <p>Ten 390 x 844 px mobile previews focused on operational trading workflows.</p>
  <section class="grid">
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=01-dashboard"></iframe></div><div class="caption">01 Dashboard</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=02-portfolio"></iframe></div><div class="caption">02 Portfolio</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=03-trades"></iframe></div><div class="caption">03 Trades</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=04-trade-detail"></iframe></div><div class="caption">04 Trade Detail</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=05-ai-decisions"></iframe></div><div class="caption">05 AI Decisions</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=06-ai-detail"></iframe></div><div class="caption">06 AI Detail</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=07-monitor"></iframe></div><div class="caption">07 AI Monitor</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=08-backtest-setup"></iframe></div><div class="caption">08 Backtest Setup</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=09-backtest-results"></iframe></div><div class="caption">09 Backtest Results</div></div>
    <div class="card"><div class="frame"><iframe src="mobile-preview.html?screen=10-admin"></iframe></div><div class="caption">10 Admin</div></div>
  </section>
</body>
</html>
